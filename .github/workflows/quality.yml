name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint Test And Security Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint/tests/snapshots/style gate/secrets)
        run: npm run verify

      - name: Generate Map Quality Report
        run: npm run map:quality:score -- --json map-quality-report.json --markdown map-quality-report.md

      - name: Upload Map Quality Report
        uses: actions/upload-artifact@v4
        with:
          name: map-quality-report
          path: |
            map-quality-report.json
            map-quality-report.md

      - name: Scan Git History For Secrets
        run: npm run security:scan:history

      - name: Audit Production Dependencies
        run: npm audit --omit=dev --audit-level=high
